name: ✅ Daily Extended Verification (5h 55m)

# One workflow, two real execution paths:
#   - push/pull_request to main -> fast checks (fmt, clippy, unit tests)
#   - schedule 12:00 UTC (15:00 UTC+3) -> real 5h55m cargo-fuzz run
#   - workflow_dispatch -> manual trigger for long fuzz without waiting for schedule

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 15:00 UTC+3 — daily 5h55m fuzz run
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quick-tests:
    name: ⚡ Quick tests (on push)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib --release

  extended-fuzz:
    name: 🔥 Extended fuzz (5h 55m)
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target 5h 55m
        run: cargo +nightly fuzz run fuzz_target_1 -- -max_total_time=21300
